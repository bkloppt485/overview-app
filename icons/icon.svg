<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0f14"/>
      <stop offset="100%" stop-color="#1a1a24"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#55ce55"/>
      <stop offset="100%" stop-color="#33aa33"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#55ce55" flood-opacity="0.4"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <!-- Border glow -->
  <rect x="8" y="8" width="496" height="496" rx="92" fill="none" stroke="#55ce55" stroke-width="3" opacity="0.3"/>
  <!-- Shield body -->
  <path d="M256 80 L400 140 L400 270 Q400 380 256 440 Q112 380 112 270 L112 140 Z" 
        fill="none" stroke="url(#glow)" stroke-width="12" stroke-linejoin="round" filter="url(#shadow)"/>
  <!-- Inner shield fill -->
  <path d="M256 100 L380 152 L380 265 Q380 362 256 418 Q132 362 132 265 L132 152 Z" 
        fill="#55ce55" opacity="0.08"/>
  <!-- Lock icon -->
  <rect x="224" y="240" width="64" height="52" rx="8" fill="url(#glow)"/>
  <path d="M236 240 L236 216 Q236 192 256 192 Q276 192 276 216 L276 240" 
        fill="none" stroke="url(#glow)" stroke-width="8" stroke-linecap="round"/>
  <!-- Keyhole -->
  <circle cx="256" cy="260" r="8" fill="#0f0f14"/>
  <rect x="253" y="264" width="6" height="12" rx="2" fill="#0f0f14"/>
  <!-- Letter O -->
  <text x="256" y="350" text-anchor="middle" font-family="Arial,sans-serif" font-weight="bold" 
        font-size="48" fill="#55ce55" opacity="0.7">OVERVIEW</text>
</svg>
